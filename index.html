<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>SPARK RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{display:flex;align-items:center;justify-content:center;}
#app{position:relative;overflow:hidden;background:#04060f;width:100vw;height:100vh;max-width:480px;}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;font-family:'Nunito',sans-serif;}
.hidden{display:none!important;}
#hud{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between;}
.hud-xp{font-family:'Orbitron',sans-serif;font-size:11px;color:#fbbf24;font-weight:700;}
.hud-state{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:4px 10px;border-radius:99px;font-weight:700;border:1px solid #2de8cc40;color:#2de8cc;background:#2de8cc20;}
.hud-score{font-family:'Orbitron',sans-serif;font-size:11px;color:#e8f0ff;}
.orb{font-family:'Orbitron',sans-serif;}
.btn{border:none;border-radius:16px;color:#fff;font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;padding:16px 32px;cursor:pointer;width:100%;max-width:300px;margin:6px 0;}
.btn-primary{background:linear-gradient(135deg,#38bdf8,#818cf8);}
.btn-secondary{background:transparent;border:2px solid #38bdf850;color:#38bdf8;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:12px 28px;}
.card{background:#111828;border-radius:20px;padding:18px 22px;max-width:320px;border:1px solid #ffffff15;width:100%;}
</style>
</head>
<body>
<div id="app">
  <canvas id="gc" width="420" height="700"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-xp" id="hudXP">⚡ 0 XP</div>
    <div class="hud-state" id="hudState">DIAGNOSTIC</div>
    <div class="hud-score" id="hudDist">0m</div>
  </div>

  <!-- TITLE -->
  <div class="screen" id="sTitle" style="background:linear-gradient(180deg,#04060f,#040d1e);">
    <canvas id="tc" width="420" height="700" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
    <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="font-size:80px;filter:drop-shadow(0 0 30px #38bdf8);">⚡</div>
      <div style="font-family:'Orbitron',sans-serif;font-size:clamp(36px,12vw,56px);font-weight:900;color:#fff;text-shadow:0 0 40px #38bdf8,0 0 80px #38bdf840;letter-spacing:4px;">SPARK</div>
      <div style="font-family:'Orbitron',sans-serif;font-size:13px;color:#38bdf8;letter-spacing:8px;margin-bottom:32px;">RUNNER</div>
      <button class="btn btn-primary" onclick="startDiagnostic()">PLAY NOW</button>
      <button class="btn btn-secondary" onclick="showHow()">How it works</button>
    </div>
  </div>

  <!-- DIAGNOSTIC INTRO -->
  <div class="screen hidden" id="sDiagIntro" style="background:#04060f;padding:24px;gap:16px;">
    <div style="font-size:52px;">🧠</div>
    <div class="orb" style="font-size:18px;color:#38bdf8;letter-spacing:3px;">BRAIN SCAN</div>
    <div class="card" style="text-align:center;">
      <div style="font-size:14px;color:#94a3b8;line-height:1.8;">
        First we need to see what your brain is doing today.<br><br>
        <strong style="color:#e8f0ff;">Just run. Don't worry about crashing.</strong><br><br>
        The game is watching your reactions — not judging them.
      </div>
    </div>
    <button class="btn btn-primary" onclick="beginDiagnosticRun()" style="margin-top:8px;">START SCAN ⚡</button>
  </div>

  <!-- SNAP DIAGNOSTIC (3 questions) -->
  <div class="screen hidden" id="sSnap" style="background:#04060f;padding:20px;gap:12px;">
    <div id="snapContent" style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:360px;"></div>
  </div>

  <!-- BIOME INTRO -->
  <div class="screen hidden" id="sBiomeIntro" style="background:#04060f;padding:24px;gap:16px;">
    <div style="font-size:64px;" id="biomeEmoji">🌋</div>
    <div class="orb" style="font-size:20px;font-weight:900;letter-spacing:2px;" id="biomeName">VOLCANO WORLD</div>
    <div class="card" style="text-align:center;" id="biomeDesc"></div>
    <div class="card" style="text-align:center;border-color:#fbbf2430;" id="biomeStrategy"></div>
    <button class="btn btn-primary" onclick="launchBiome()" id="biomeBtn">ENTER ⚡</button>
  </div>

  <!-- REGULATION PAUSE -->
  <div class="screen hidden" id="sRegulate" style="background:#04060f;padding:20px;gap:14px;overflow-y:auto;">
    <div id="regulateContent" style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:360px;"></div>
  </div>

  <!-- INSIGHT -->
  <div class="screen hidden" id="sInsight" style="background:#04060f;padding:24px;gap:16px;">
    <div style="font-size:56px;" id="insightEmoji">✨</div>
    <div class="orb" style="font-size:14px;color:#fbbf24;letter-spacing:3px;">BRAIN INSIGHT</div>
    <div class="card" style="text-align:center;" id="insightText"></div>
    <div class="card" style="border-color:#2de8cc30;text-align:center;" id="insightXP"></div>
    <button class="btn btn-primary" onclick="startGame(currentBiome)">RUN AGAIN ⚡</button>
    <button class="btn btn-secondary" onclick="goTitle()">Main Menu</button>
  </div>

</div>

<script>
window.addEventListener('load', function() {

/* ========================================
   CANVAS + DIMENSIONS
======================================== */
const app = document.getElementById('app');
const gc  = document.getElementById('gc');
const ctx = gc.getContext('2d');
const W   = Math.min(window.innerWidth, 480);
const H   = window.innerHeight;
gc.width  = W; gc.height = H;
const GY  = H - Math.round(H * 0.16);  // ground y
const HX  = Math.round(W * 0.18);       // hero x

/* ========================================
   TITLE CANVAS ANIMATION
======================================== */
const tc = document.getElementById('tc');
const tctx = tc.getContext('2d');
tc.width = W; tc.height = H;
const tStars = Array.from({length:150},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.3,t:Math.random()*Math.PI*2,s:Math.random()*0.02+0.008}));
const tHero = {x:-60,y:GY-80,vx:3.5};
function animTitle(){
  tctx.clearRect(0,0,W,H);
  const g=tctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#04060f');g.addColorStop(0.6,'#040d1e');g.addColorStop(1,'#04080f');
  tctx.fillStyle=g;tctx.fillRect(0,0,W,H);
  tStars.forEach(s=>{s.t+=s.s;tctx.globalAlpha=0.3+Math.sin(s.t)*0.4;tctx.fillStyle='#fff';tctx.beginPath();tctx.arc(s.x,s.y,s.r,0,Math.PI*2);tctx.fill();});
  tctx.globalAlpha=1;
  tHero.x+=tHero.vx; if(tHero.x>W+60)tHero.x=-60;
  drawHeroAt(tctx,tHero.x,tHero.y,40,'#38bdf8',0);
  tctx.strokeStyle='#38bdf830';tctx.lineWidth=2;tctx.beginPath();tctx.moveTo(0,GY);tctx.lineTo(W,GY);tctx.stroke();
  requestAnimationFrame(animTitle);
}
animTitle();

/* ========================================
   ROUNDRECT POLYFILL
======================================== */
function rr(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

/* ========================================
   BIOME DEFINITIONS
======================================== */
const BIOMES = {
  diagnostic:{
    id:'diagnostic',name:'DIAGNOSTIC RUN',emoji:'🔬',
    color:'#38bdf8',sky1:'#04060f',sky2:'#040d1e',ground:'#0a1020',
    baseSpeed:4.5, speedCap:7, particleColor:'#38bdf8',
    desc:'The game is reading your brain. Just run — there are no wrong moves here.',
    strategy:'React naturally. Jump when you need to. The obstacles will reveal your pattern.',
    label:'🔬 SCANNING'
  },
  volcano:{
    id:'volcano',name:'VOLCANO WORLD',emoji:'🌋',
    color:'#ff6b6b',sky1:'#1a0505',sky2:'#2d0a0a',ground:'#3d1010',
    baseSpeed:7, speedCap:12, particleColor:'#ff6b6b',
    desc:'High energy detected. This world matches your fire — but precision beats speed here.',
    strategy:'💡 Your brain tip: You\'re running HOT. One focused jump beats three panicked ones. Breathe between obstacles.',
    label:'🌋 VOLCANO'
  },
  ocean:{
    id:'ocean',name:'DEEP OCEAN',emoji:'🌊',
    color:'#2de8cc',sky1:'#020e14',sky2:'#041218',ground:'#061820',
    baseSpeed:4, speedCap:7, particleColor:'#2de8cc',
    desc:'Tension detected. This world runs on rhythm — obstacles move in patterns you can master.',
    strategy:'💡 Your brain tip: Watch the pattern before you jump. Your brain is good at this when it feels safe.',
    label:'🌊 OCEAN'
  },
  fog:{
    id:'fog',name:'FOG WORLD',emoji:'🌫️',
    color:'#94a3b8',sky1:'#080a0e',sky2:'#0a0c12',ground:'#141820',
    baseSpeed:3, speedCap:5, particleColor:'#a0aec0',
    desc:'Low energy detected. Hidden things to discover — gentle speed, big rewards.',
    strategy:'💡 Your brain tip: You don\'t need speed right now. Find the hidden gems. Curiosity wakes the brain up.',
    label:'🌫 FOG'
  },
  flow:{
    id:'flow',name:'FLOW STATE',emoji:'⚡',
    color:'#fbbf24',sky1:'#0a0800',sky2:'#100e00',ground:'#1a1400',
    baseSpeed:6, speedCap:9, particleColor:'#fbbf24',
    desc:'REGULATED. This is your power zone — speed AND control working together.',
    strategy:'💡 Your brain tip: This is what regulation feels like. Remember this feeling.',
    label:'⚡ FLOW'
  }
};

/* ========================================
   BRAIN STATES (diagnostic output)
======================================== */
const BRAIN_STATES = {
  hyperactive:{
    label:'HYPERACTIVE',color:'#ff6b6b',emoji:'🌋',
    desc:'Your brain is running at FULL POWER right now. High energy, fast reactions, hard to brake.',
    biome:'volcano',
    regulation:'volcano'
  },
  anxious:{
    label:'ANXIOUS / TENSE',color:'#f97316',emoji:'⚡',
    desc:'Your brain is in alert mode — tight, watchful, ready to react. Lots of energy with nowhere to go.',
    biome:'ocean',
    regulation:'breathe'
  },
  foggy:{
    label:'FOGGY / LOW',color:'#94a3b8',emoji:'🌫️',
    desc:'Your brain is running slow today — hard to get started, hard to focus. That\'s okay.',
    biome:'fog',
    regulation:'move'
  },
  frustrated:{
    label:'FRUSTRATED',color:'#a78bfa',emoji:'🔥',
    desc:'Your brain is stuck in a loop — energy building with no release. Classic ADHD frustration pattern.',
    biome:'ocean',
    regulation:'shake'
  },
  regulated:{
    label:'REGULATED',color:'#2de8cc',emoji:'🌊',
    desc:'Your brain is in a good place — not too fast, not too slow. You\'re in the zone.',
    biome:'flow',
    regulation:'none'
  }
};

/* ========================================
   SNAP QUESTIONS
======================================== */
const SNAP_QUESTIONS = [
  {
    q:'Your brain feels like...',
    options:[
      {word:'⛈ STORM',    state:'hyperactive', score:{hyperactive:3,anxious:1}},
      {word:'🌫 FOG',      state:'foggy',       score:{foggy:3}},
      {word:'🔥 FIRE',     state:'frustrated',  score:{frustrated:3,hyperactive:1}},
      {word:'🌊 STILL',    state:'regulated',   score:{regulated:3}},
      {word:'🌋 VOLCANO',  state:'hyperactive', score:{hyperactive:2,frustrated:2}},
      {word:'❄️ FROZEN',   state:'foggy',       score:{foggy:2,anxious:2}},
    ]
  },
  {
    q:'Your body feels...',
    options:[
      {word:'⚡ ELECTRIC', state:'hyperactive', score:{hyperactive:3}},
      {word:'🪨 HEAVY',    state:'foggy',       score:{foggy:3}},
      {word:'🔒 TIGHT',    state:'anxious',     score:{anxious:3}},
      {word:'🌀 BUZZING',  state:'hyperactive', score:{hyperactive:2,anxious:1}},
      {word:'😤 TENSE',    state:'frustrated',  score:{frustrated:3}},
      {word:'😌 EASY',     state:'regulated',   score:{regulated:3}},
    ]
  },
  {
    q:'Right now you want to...',
    options:[
      {word:'💨 GO FASTER', state:'hyperactive', score:{hyperactive:3}},
      {word:'🛌 HIDE',      state:'foggy',       score:{foggy:2,anxious:2}},
      {word:'👊 FIGHT',     state:'frustrated',  score:{frustrated:3}},
      {word:'😴 SLEEP',     state:'foggy',       score:{foggy:3}},
      {word:'😤 SCREAM',    state:'frustrated',  score:{frustrated:2,hyperactive:2}},
      {word:'🎯 FOCUS',     state:'regulated',   score:{regulated:3}},
    ]
  }
];

/* ========================================
   REGULATION TOOLS
======================================== */
const REG_TOOLS = {
  breathe:{
    title:'BOX BREATHING',emoji:'💨',color:'#2de8cc',xp:30,
    desc:'Your nervous system is activated. 4 counts in, hold, out, hold — this physically slows your heart rate.',
    phases:[{l:'IN',d:4},{l:'HOLD',d:4},{l:'OUT',d:4},{l:'HOLD',d:2}],
    cycles:3
  },
  shake:{
    title:'BODY SHAKE',emoji:'🫨',color:'#ff6b6b',xp:20,
    desc:'Frustration stores in the body. 30 seconds of shaking literally discharges built-up stress hormones.',
    duration:30
  },
  move:{
    title:'10 JUMP BLASTS',emoji:'⭐',color:'#fbbf24',xp:20,
    desc:'Low energy needs a jumpstart. 10 jumping jacks triggers dopamine and wakes up your prefrontal cortex.',
    count:10
  },
  volcano:{
    title:'VOLCANO BREATH',emoji:'🌋',color:'#ff6b6b',xp:25,
    desc:'High energy needs channelling. Breathe in through your nose, ROAR out through your mouth. 5 times.',
    phases:[{l:'BREATHE IN',d:3},{l:'ROAR OUT',d:2}],
    cycles:5
  }
};

/* ========================================
   GAME STATE
======================================== */
let G = {
  running:false, screen:'title',
  biome:'diagnostic', currentBiome:'diagnostic',
  xp:0, sessionXP:0, distance:0,
  speed:4.5, nextCP:500, cpGap:600,
  snapCount:0, crashCount:0,
  diagData:{reactionTimes:[],jumpCount:0,doubleJumps:0,slideCount:0,firstCrashDist:0},
  snapScores:{hyperactive:0,anxious:0,foggy:0,frustrated:0,regulated:0},
  detectedState:null, totalXP:0
};
let currentBiome = 'diagnostic';
let animId = null;
let lastTime = 0;

/* ========================================
   HERO
======================================== */
const hero = {
  x:HX, y:GY-60, vy:0, w:34, h:54,
  onGround:true, jumping:false, sliding:false, slideTimer:0,
  crashed:false, invincible:0, jumpCount:0,
  frame:0, frameTimer:0,
  trail:[],
  lastJumpTime:0,

  jump(){
    if(this.jumpCount<2&&!this.crashed){
      const now=performance.now();
      const rt=this.lastJumpTime>0?now-this.lastJumpTime:0;
      if(rt>0&&rt<2000)G.diagData.reactionTimes.push(rt);
      this.lastJumpTime=now;
      this.vy=-15; this.onGround=false; this.jumping=true; this.jumpCount++;
      G.diagData.jumpCount++;
      if(this.jumpCount===2)G.diagData.doubleJumps++;
      burst(this.x+this.w/2,this.y,BIOMES[G.biome].color,10);
    }
  },
  slide(){
    if(!this.onGround||this.crashed)return;
    this.sliding=true; this.slideTimer=38;
    G.diagData.slideCount++;
  },
  update(){
    if(this.crashed)return;
    this.vy+=0.72; this.y+=this.vy;
    if(this.y>=GY-this.h){this.y=GY-this.h;this.vy=0;this.onGround=true;this.jumping=false;this.jumpCount=0;}
    else this.onGround=false;
    if(this.sliding){this.slideTimer--;if(this.slideTimer<=0)this.sliding=false;}
    if(this.invincible>0)this.invincible--;
    const c=BIOMES[G.biome].particleColor;
    this.trail.push({x:this.x+(this.sliding?this.w:2),y:this.y+(this.sliding?this.h*.7:this.h*.4),life:16,maxLife:16,color:c,vx:-(G.speed*.3+Math.random()*1.2),vy:(Math.random()-.5)*1.2,r:Math.random()*4+2});
    this.trail=this.trail.map(p=>({...p,x:p.x+p.vx,y:p.y+p.vy,life:p.life-1})).filter(p=>p.life>0);
    this.frameTimer++;if(this.frameTimer>6){this.frame=(this.frame+1)%4;this.frameTimer=0;}
  },
  getHB(){
    const sy=this.sliding?this.y+this.h*.4:this.y;
    const sh=this.sliding?this.h*.6:this.h;
    return{x:this.x+6,y:sy+4,w:this.w-12,h:sh-8};
  }
};

function resetHero(){
  hero.x=HX;hero.y=GY-hero.h;hero.vy=0;hero.onGround=true;
  hero.jumping=false;hero.sliding=false;hero.crashed=false;
  hero.invincible=0;hero.jumpCount=0;hero.trail=[];hero.lastJumpTime=0;
  hero.frame=0;hero.frameTimer=0;
}

/* ========================================
   DRAW HERO
======================================== */
function drawHeroAt(c,hx,hy,size,color,frame){
  const hw=size*.65,hh=size;
  const sl=false;
  c.save();
  c.shadowBlur=18;c.shadowColor=color;
  // trail
  if(hero.trail&&c===ctx){
    hero.trail.forEach(p=>{
      const a=p.life/p.maxLife;
      c.globalAlpha=a*.7;c.fillStyle=p.color;c.shadowBlur=8;c.shadowColor=p.color;
      c.beginPath();c.ellipse(p.x,p.y,p.r*a,p.r*.5*a,0,0,Math.PI*2);c.fill();
    });
    c.globalAlpha=1;
  }
  if(hero.invincible>0&&c===ctx&&Math.floor(hero.invincible/4)%2===0){c.restore();return;}
  // body
  c.fillStyle=color;
  rr(c,hx+4,hy+18,hw-8,hh-18,5);c.fill();
  // cape
  c.fillStyle=color+'70';
  c.beginPath();c.moveTo(hx,hy+20);c.lineTo(hx-18-(frame||0)*2,hy+28);c.lineTo(hx-10,hy+38);c.lineTo(hx,hy+34);c.closePath();c.fill();
  // helmet
  c.fillStyle='#0d1535';c.shadowBlur=0;
  c.beginPath();c.ellipse(hx+hw/2,hy+12,hw/2-1,13,0,0,Math.PI*2);c.fill();
  // visor
  c.fillStyle=color;c.globalAlpha=.9;
  c.beginPath();c.ellipse(hx+hw/2,hy+13,hw/2-5,9,0,0,Math.PI*2);c.fill();
  c.globalAlpha=1;
  // eyes
  c.fillStyle='#fff';c.shadowBlur=6;c.shadowColor='#fff';
  c.fillRect(hx+hw/2-7,hy+10,4,4);c.fillRect(hx+hw/2+3,hy+10,4,4);
  // bolt
  c.fillStyle='#fff';c.shadowColor='#fbbf24';c.shadowBlur=10;
  c.beginPath();c.moveTo(hx+hw/2,hy+24);c.lineTo(hx+hw/2-4,hy+32);c.lineTo(hx+hw/2-1,hy+32);c.lineTo(hx+hw/2-3,hy+40);c.lineTo(hx+hw/2+5,hy+29);c.lineTo(hx+hw/2+1,hy+29);c.lineTo(hx+hw/2+4,hy+24);c.closePath();c.fill();
  // legs
  if(!hero.sliding||c!==ctx){
    const lo=Math.sin((frame||0)*1.6)*7;
    c.fillStyle=color;c.shadowBlur=0;
    c.fillRect(hx+4,hy+hh-14,9,14+lo);c.fillRect(hx+hw-13,hy+hh-14,9,14-lo);
  }
  c.restore();
}

/* ========================================
   PARTICLES
======================================== */
let particles=[];
function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*(2+Math.random()*5),vy:Math.sin(a)*(2+Math.random()*5)-2,life:28,maxLife:28,color,r:3+Math.random()*4});
  }
}
function updateParticles(){
  particles=particles.map(p=>({...p,x:p.x+p.vx,y:p.y+p.vy,vy:p.vy+.25,life:p.life-1})).filter(p=>p.life>0);
}
function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.shadowBlur=8;ctx.shadowColor=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}

/* ========================================
   OBSTACLES
======================================== */
let obstacles=[], obsCooldown=120;
const OBS_TYPES=[
  {type:'spike',w:26,h:30,color:'#ff4444'},
  {type:'wall', w:18,h:62,color:'#6b7fa8'},
  {type:'laser',w:0, h:20,color:'#ff6b6b',isLaser:true},
  {type:'float',w:30,h:26,color:'#fbbf24',isFloat:true},
  {type:'double',w:20,h:46,color:'#a78bfa',isDouble:true},
  {type:'gem',  w:24,h:24,color:'#2de8cc',isGem:true},  // collectible in fog world
];

function spawnObs(){
  if(obsCooldown>0){obsCooldown--;return;}
  obsCooldown=85+Math.floor(Math.random()*70);
  let pool;
  const d=G.distance;
  const b=G.biome;
  if(b==='diagnostic'){
    // Diagnostic: gentle ramp, engineer first crash around 300-500m
    if(d<150)pool=[0,0,1];
    else if(d<350)pool=[0,0,1,1,3];
    else pool=[0,1,1,2,3,4];
  } else if(b==='volcano'){
    // Volcano: fast, lots of precise jumps needed
    pool=[0,0,0,1,2,3,4];
    obsCooldown=60+Math.floor(Math.random()*50);
  } else if(b==='ocean'){
    // Ocean: rhythm patterns
    pool=[0,1,1,1,3,2];
    obsCooldown=95+Math.floor(Math.random()*60);
  } else if(b==='fog'){
    // Fog: mostly gems, few obstacles
    pool=[0,1,5,5,5,3];
    obsCooldown=100+Math.floor(Math.random()*80);
  } else {
    pool=[0,0,1,2,3,4];
  }
  const t={...OBS_TYPES[pool[Math.floor(Math.random()*pool.length)]]};
  t.x=W+30;
  if(t.isLaser){t.w=W;t.y=GY-84;t.warnTimer=90;}
  else if(t.isFloat){t.y=GY-108;}
  else if(t.isDouble){t.y=GY-t.h;t.x2=W+95;}
  else if(t.isGem){t.y=GY-80-Math.random()*120;} // floating gems
  else{t.y=GY-t.h;}
  obstacles.push(t);
}

/* ========================================
   BACKGROUND
======================================== */
let bgStars=Array.from({length:120},()=>({x:Math.random()*W*2,y:Math.random()*H,r:Math.random()*1.5+.3,op:Math.random()*.6+.2}));
let bgX=0;

function drawBG(){
  const b=BIOMES[G.biome];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,b.sky1);g.addColorStop(.65,b.sky2);g.addColorStop(1,b.ground);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // stars
  bgStars.forEach(s=>{
    const sx=((s.x-bgX*.5)%(W*2)+W*2)%(W*2);
    ctx.save();ctx.globalAlpha=s.op;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  // ground
  bgX+=G.speed;
  ctx.fillStyle=b.ground;ctx.fillRect(0,GY,W,H-GY);
  const gl=ctx.createLinearGradient(0,GY,0,GY+25);
  gl.addColorStop(0,b.color+'25');gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.fillRect(0,GY,W,25);
  ctx.strokeStyle=b.color+'35';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();
  // ground grid
  ctx.strokeStyle=b.color+'15';ctx.lineWidth=1;
  for(let x=(-(bgX%60));x<W;x+=60){ctx.beginPath();ctx.moveTo(x,GY);ctx.lineTo(x,H);ctx.stroke();}
}

function drawObs(){
  const b=BIOMES[G.biome];
  obstacles.forEach(o=>{
    ctx.save();ctx.shadowBlur=14;ctx.shadowColor=o.color;
    if(o.isLaser){
      if(o.warnTimer>0){
        const a=(o.warnTimer%16<8)?.85:.2;
        ctx.globalAlpha=a;ctx.fillStyle='#ff0000';
        ctx.font='bold 12px Orbitron';ctx.textAlign='center';
        ctx.fillText('⚠ DUCK! ⚠',W/2,o.y-10);
        ctx.fillStyle=o.color+'30';ctx.fillRect(0,o.y,W,o.h);
      } else {
        ctx.fillStyle=o.color;ctx.fillRect(0,o.y,W,o.h);
        ctx.fillStyle='#fff';ctx.fillRect(0,o.y+o.h/2-2,W,4);
      }
    } else if(o.type==='spike'){
      ctx.fillStyle=o.color;
      for(let i=0;i<3;i++){
        const sx=o.x+i*(o.w/3);
        ctx.beginPath();ctx.moveTo(sx,o.y+o.h);ctx.lineTo(sx+o.w/6,o.y);ctx.lineTo(sx+o.w/3,o.y+o.h);ctx.closePath();ctx.fill();
      }
    } else if(o.isGem){
      // rotating gem collectible
      ctx.fillStyle=o.color;ctx.shadowBlur=20;
      const gs=10+Math.sin(Date.now()/400)*2;
      ctx.beginPath();ctx.moveTo(o.x+o.w/2,o.y);ctx.lineTo(o.x+o.w,o.y+o.h/2);ctx.lineTo(o.x+o.w/2,o.y+o.h);ctx.lineTo(o.x,o.y+o.h/2);ctx.closePath();ctx.fill();
    } else {
      ctx.fillStyle=o.color+'cc';
      rr(ctx,o.x,o.y,o.w,o.h,4);ctx.fill();
      ctx.strokeStyle=o.color;ctx.lineWidth=2;ctx.stroke();
      if(o.isDouble){rr(ctx,o.x2,o.y,o.w,o.h,4);ctx.fill();}
    }
    ctx.restore();
  });
}

/* ========================================
   GAME LOOP
======================================== */
function gameLoop(ts){
  if(!G.running)return;
  try{
    lastTime=ts;
    const b=BIOMES[G.biome];
    G.speed=Math.min(b.baseSpeed+G.distance*.004,b.speedCap);
    // move obs
    obstacles.forEach(o=>{o.x-=G.speed;if(o.x2)o.x2-=G.speed;if(o.isLaser&&o.warnTimer>0)o.warnTimer--;});
    obstacles=obstacles.filter(o=>o.x>-80);
    G.distance+=G.speed*.05;
    // checkpoint
    if(G.distance>=G.nextCP){
      G.nextCP+=G.cpGap;G.cpGap=Math.max(350,G.cpGap-30);G.snapCount++;
      G.running=false;cancelAnimationFrame(animId);
      if(G.biome==='diagnostic'&&G.distance>200){
        triggerCrash(true);// engineered first snap
      } else {
        triggerCrash(false);
      }
      return;
    }
    spawnObs();
    hero.update();
    checkHits();
    updateParticles();
    // draw
    ctx.clearRect(0,0,W,H);
    drawBG();
    drawObs();
    drawParticles();
    drawHeroAt(ctx,hero.x,hero.y,hero.h,b.color,hero.frame);
    drawHUD2();
    animId=requestAnimationFrame(gameLoop);
  }catch(e){console.error(e);}
}

function drawHUD2(){
  // distance pill
  ctx.save();ctx.fillStyle='rgba(0,0,0,.45)';
  rr(ctx,W/2-44,44,88,20,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 11px Orbitron';ctx.textAlign='center';
  ctx.fillText(Math.floor(G.distance)+'m',W/2,57);
  // control hints (fade after 200m)
  const a=Math.max(0,Math.min(.5,(200-G.distance)/200));
  if(a>0){
    ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.font='bold 11px Nunito';
    ctx.fillText('TAP LEFT=JUMP   TAP RIGHT=SLIDE',W/2,H-22);
  }
  // zone divider
  ctx.globalAlpha=.06;ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(W*.67,GY+8);ctx.lineTo(W*.67,H);ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function checkHits(){
  if(hero.invincible>0||hero.crashed)return;
  const hb=hero.getHB();
  for(const o of obstacles){
    if(o.isLaser&&o.warnTimer>0)continue;
    let hit=false;
    if(o.isLaser){hit=hb.y+hb.h>o.y&&hb.y<o.y+o.h;}
    else if(o.isGem){
      // collect gem
      if(hb.x<o.x+o.w&&hb.x+hb.w>o.x&&hb.y<o.y+o.h&&hb.y+hb.h>o.y){
        burst(o.x+o.w/2,o.y+o.h/2,o.color,15);
        G.sessionXP+=25;toast('+25 XP 💎');
        obstacles=obstacles.filter(x=>x!==o);
        return;
      }
    } else {
      hit=hb.x<o.x+o.w&&hb.x+hb.w>o.x&&hb.y<o.y+o.h&&hb.y+hb.h>o.y;
      if(!hit&&o.isDouble)hit=hb.x<o.x2+o.w&&hb.x+hb.w>o.x2&&hb.y<o.y+o.h&&hb.y+hb.h>o.y;
    }
    if(hit){
      burst(hero.x+hero.w/2,hero.y+hero.h/2,'#ff6b6b',25);
      hero.crashed=true;
      if(G.diagData.firstCrashDist===0)G.diagData.firstCrashDist=G.distance;
      G.crashCount++;
      setTimeout(()=>{G.running=false;cancelAnimationFrame(animId);triggerCrash(false);},700);
      return;
    }
  }
}

/* ========================================
   DIAGNOSTIC ANALYSIS
======================================== */
function analyseDiagnostic(){
  const d=G.diagData;
  const avgRT=d.reactionTimes.length>0?d.reactionTimes.reduce((a,b)=>a+b,0)/d.reactionTimes.length:500;
  const djRatio=d.jumpCount>0?d.doubleJumps/d.jumpCount:0;
  // Fast reactions + lots of double jumps = hyperactive/impulsive
  // Slow reactions + few jumps = foggy
  // Many slides = anxious/controlled
  let scores={hyperactive:0,anxious:0,foggy:0,frustrated:0,regulated:0};
  if(avgRT<350)scores.hyperactive+=3;
  else if(avgRT<550)scores.regulated+=2;
  else scores.foggy+=3;
  if(djRatio>.5)scores.hyperactive+=2;
  if(d.slideCount>2)scores.anxious+=2;
  if(d.firstCrashDist<200)scores.frustrated+=2;
  else if(d.firstCrashDist>400)scores.regulated+=2;
  if(G.crashCount>3)scores.hyperactive+=1;
  // merge with snap scores
  Object.keys(scores).forEach(k=>scores[k]+=G.snapScores[k]||0);
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

/* ========================================
   CRASH -> REGULATION FLOW
======================================== */
let snapStep=0, snapAnswers=[];

function triggerCrash(engineered){
  const earned=Math.floor(G.distance*.5+G.snapCount*15);
  G.sessionXP+=earned;
  showScreen('sRegulate');
  if(G.biome==='diagnostic'||engineered){
    // After diagnostic run — do full 3-question snap
    snapStep=0; snapAnswers=[];
    showSnapQ(0);
  } else {
    // Mid-game crash — quick 1-question + regulation tool
    showQuickRegulate();
  }
}

function showSnapQ(qIdx){
  if(qIdx>=SNAP_QUESTIONS.length){
    // All 3 answered — analyse and show biome
    finishDiagnostic();
    return;
  }
  const q=SNAP_QUESTIONS[qIdx];
  const box=document.getElementById('regulateContent');
  box.innerHTML=
    '<div style="font-family:Orbitron,sans-serif;font-size:11px;color:#fbbf24;letter-spacing:4px;margin-bottom:4px">QUESTION '+(qIdx+1)+' OF 3</div>'+
    '<div style="font-family:Orbitron,sans-serif;font-size:16px;font-weight:900;color:#e8f0ff;text-align:center;line-height:1.5;margin-bottom:8px">'+q.q+'</div>'+
    '<div style="font-size:12px;color:#6b7fa8;margin-bottom:12px">Tap fast — first instinct wins</div>'+
    '<div id="snapGrid" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:340px;"></div>';
  const grid=document.getElementById('snapGrid');
  q.options.sort(()=>Math.random()-.5).forEach(opt=>{
    const b=document.createElement('button');
    b.textContent=opt.word;
    b.style.cssText='background:#111828;border:2px solid #ffffff20;border-radius:99px;color:#e8f0ff;font-family:Orbitron,sans-serif;font-size:13px;font-weight:700;padding:13px 16px;cursor:pointer;min-width:110px;';
    b.onclick=()=>answerSnap(opt,qIdx);
    grid.appendChild(b);
  });
}

function answerSnap(opt,qIdx){
  snapAnswers.push(opt);
  // add to scores
  Object.entries(opt.score||{}).forEach(([k,v])=>{G.snapScores[k]=(G.snapScores[k]||0)+v;});
  // flash selected
  showSnapQ(qIdx+1);
}

function finishDiagnostic(){
  const state=analyseDiagnostic();
  G.detectedState=state;
  const bs=BRAIN_STATES[state];
  currentBiome=bs.biome;
  // Show regulation tool first if needed
  if(bs.regulation!=='none'){
    showRegTool(bs.regulation, ()=>showBiomeIntro(bs.biome));
  } else {
    showBiomeIntro(bs.biome);
  }
}

function showQuickRegulate(){
  // Quick 1-question check-in after crash
  const q=SNAP_QUESTIONS[Math.floor(Math.random()*SNAP_QUESTIONS.length)];
  const box=document.getElementById('regulateContent');
  box.innerHTML=
    '<div style="font-size:52px;margin-bottom:4px">💥</div>'+
    '<div style="font-family:Orbitron,sans-serif;font-size:22px;font-weight:900;color:#ff6b6b;margin-bottom:8px">CRASHED</div>'+
    '<div style="font-size:13px;color:#6b7fa8;margin-bottom:16px">Quick check — '+q.q.toLowerCase()+'</div>'+
    '<div id="snapGrid" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:340px;margin-bottom:16px"></div>';
  const grid=document.getElementById('snapGrid');
  q.options.sort(()=>Math.random()-.5).slice(0,6).forEach(opt=>{
    const b=document.createElement('button');
    b.textContent=opt.word;
    b.style.cssText='background:#111828;border:2px solid #ffffff20;border-radius:99px;color:#e8f0ff;font-family:Orbitron,sans-serif;font-size:13px;font-weight:700;padding:13px 16px;cursor:pointer;min-width:110px;';
    b.onclick=()=>{
      Object.entries(opt.score||{}).forEach(([k,v])=>{G.snapScores[k]=(G.snapScores[k]||0)+v;});
      // offer regulation then back to game
      const newState=analyseDiagnostic();
      const bs=BRAIN_STATES[newState];
      if(bs.regulation!=='none'&&Math.random()>.4){
        showRegTool(bs.regulation,()=>resumeAfterCrash());
      } else {
        resumeAfterCrash();
      }
    };
    grid.appendChild(b);
  });
}

function resumeAfterCrash(){
  obstacles=[];obsCooldown=120;
  resetHero();hero.invincible=80;
  showScreen('game');
  G.running=true;
  lastTime=performance.now();
  animId=requestAnimationFrame(gameLoop);
}

/* ========================================
   REGULATION TOOLS UI
======================================== */
function showRegTool(toolId, onDone){
  const tool=REG_TOOLS[toolId];
  if(!tool){onDone();return;}
  const box=document.getElementById('regulateContent');
  box.innerHTML=
    '<div style="font-size:52px">'+tool.emoji+'</div>'+
    '<div style="font-family:Orbitron,sans-serif;font-size:16px;color:'+tool.color+';letter-spacing:2px">'+tool.title+'</div>'+
    '<div style="background:#111828;border-radius:16px;padding:16px;max-width:300px;font-size:13px;color:#94a3b8;line-height:1.8;text-align:center;border:1px solid #ffffff10">'+tool.desc+'</div>'+
    '<div id="regExercise" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;"></div>'+
    '<button id="regSkip" style="background:transparent;border:1px solid #ffffff20;border-radius:99px;color:#6b7fa8;font-family:Nunito,sans-serif;font-size:12px;padding:8px 20px;cursor:pointer;margin-top:4px;">Skip (-15 XP)</button>';
  document.getElementById('regSkip').onclick=()=>{G.sessionXP=Math.max(0,G.sessionXP-15);onDone();};
  if(tool.phases)runBreathe(tool,onDone);
  else if(tool.duration)runShake(tool,onDone);
  else if(tool.count)runCount(tool,onDone);
}

function runBreathe(tool,onDone){
  let phaseIdx=0,count=tool.phases[0].d,cycles=0;
  const el=document.getElementById('regExercise');
  let iv=null;
  function render(){
    const ph=tool.phases[phaseIdx];
    const colors={IN:'#2de8cc',HOLD:'#fbbf24',OUT:'#818cf8','BREATHE IN':'#2de8cc','ROAR OUT':'#ff6b6b'};
    const col=colors[ph.l]||tool.color;
    const scale=ph.l==='IN'||ph.l==='BREATHE IN'||ph.l==='HOLD'?1.25:1;
    el.innerHTML=
      '<div style="font-size:11px;color:#6b7fa8;font-family:Orbitron,sans-serif;letter-spacing:2px">CYCLE '+(cycles+1)+'/'+tool.cycles+'</div>'+
      '<div style="width:130px;height:130px;border-radius:50%;border:3px solid '+col+';background:radial-gradient(circle,'+col+'20,transparent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px '+col+'40;transform:scale('+scale+');transition:all '+(ph.d*.9)+'s ease;">'+
        '<div style="font-family:Orbitron,sans-serif;font-size:44px;font-weight:900;color:'+col+'">'+count+'</div>'+
      '</div>'+
      '<div style="font-family:Orbitron,sans-serif;font-size:14px;color:'+col+';letter-spacing:3px">'+ph.l+'</div>'+
      '<div style="display:flex;gap:6px;">'+Array.from({length:tool.cycles},(_,i)=>'<div style="width:10px;height:10px;border-radius:50%;background:'+(i<cycles?tool.color:'#111828')+';border:1px solid '+tool.color+'40;"></div>').join('')+'</div>';
  }
  render();
  iv=setInterval(()=>{
    count--;
    if(count<=0){
      phaseIdx=(phaseIdx+1)%tool.phases.length;
      if(phaseIdx===0){cycles++;if(cycles>=tool.cycles){clearInterval(iv);G.sessionXP+=tool.xp;toast('+'+tool.xp+' XP 💨');setTimeout(onDone,600);return;}}
      count=tool.phases[phaseIdx].d;
    }
    render();
  },1000);
}

function runShake(tool,onDone){
  let secs=tool.duration;
  const el=document.getElementById('regExercise');
  el.innerHTML='<div style="font-family:Orbitron,sans-serif;font-size:52px;font-weight:900;color:'+tool.color+'">'+secs+'</div><div style="font-family:Orbitron,sans-serif;font-size:12px;color:'+tool.color+';letter-spacing:3px">SHAKE IT OUT</div>';
  const iv=setInterval(()=>{
    secs--;
    const num=el.querySelector('div');
    if(num)num.textContent=secs;
    if(secs<=0){clearInterval(iv);G.sessionXP+=tool.xp;toast('+'+tool.xp+' XP 🫨');setTimeout(onDone,600);}
  },1000);
}

function runCount(tool,onDone){
  let n=0;
  const el=document.getElementById('regExercise');
  function render(){
    el.innerHTML=
      '<div style="width:130px;height:130px;border-radius:50%;border:3px solid '+tool.color+';background:radial-gradient(circle,'+tool.color+'15,transparent);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 30px '+tool.color+'30;" id="countBtn">'+
        '<div style="font-family:Orbitron,sans-serif;font-size:48px;font-weight:900;color:'+tool.color+'">'+(n>=tool.count?'✓':n)+'</div>'+
        (n<tool.count?'<div style="font-size:10px;color:#6b7fa8;font-family:Orbitron">TAP</div>':'')+
      '</div>'+
      '<div style="width:200px;background:#111828;border-radius:99px;height:6px;overflow:hidden;"><div style="height:100%;width:'+(n/tool.count*100)+'%;background:linear-gradient(90deg,'+tool.color+',#2de8cc);border-radius:99px;"></div></div>';
    const btn=document.getElementById('countBtn');
    if(btn&&n<tool.count)btn.onclick=()=>{n++;if(n>=tool.count){G.sessionXP+=tool.xp;toast('+'+tool.xp+' XP ⭐');setTimeout(onDone,800);}else render();};
  }
  render();
}

/* ========================================
   TOAST
======================================== */
let toastTO=null;
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;top:22px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#2de8cc,#818cf8);border-radius:99px;padding:9px 22px;font-family:Orbitron,sans-serif;font-size:12px;font-weight:700;color:#fff;z-index:99;pointer-events:none;white-space:nowrap;';document.getElementById('app').appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastTO);toastTO=setTimeout(()=>{t.style.opacity='0';},2200);
}

function showHow(){alert('SPARK RUNNER\n\nLEFT side = JUMP (double tap = double jump)\nRIGHT side = SLIDE under lasers\n\nThe game reads your brain through how you play.\nAfter each crash, quick check-in questions adapt the game to your brain state.\n\nFeel the difference between Volcano World, Ocean World, Fog World and Flow State.');}

/* ========================================
   TOUCH INPUT
======================================== */
// Create tap zones
const jz=document.createElement('div');jz.id='jumpZone';
jz.style.cssText='position:absolute;left:0;top:0;width:67%;height:100%;z-index:16;display:none;';
const sz=document.createElement('div');sz.id='slideZone';
sz.style.cssText='position:absolute;right:0;top:0;width:33%;height:100%;z-index:16;display:none;';
document.getElementById('app').appendChild(jz);
document.getElementById('app').appendChild(sz);

jz.addEventListener('touchstart',e=>{e.preventDefault();if(G.running)hero.jump();},{passive:false});
sz.addEventListener('touchstart',e=>{e.preventDefault();if(G.running)hero.slide();},{passive:false});

document.addEventListener('keydown',e=>{
  if(!G.running)return;
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();hero.jump();}
  if(e.code==='ArrowDown'){e.preventDefault();hero.slide();}
});

// Update HUD
setInterval(()=>{
  if(G.running){
    document.getElementById('hudXP').textContent='⚡ '+(G.totalXP+G.sessionXP)+' XP';
    document.getElementById('hudDist').textContent=Math.floor(G.distance)+'m';
  }
},200);

}); // end window.load
</script>
